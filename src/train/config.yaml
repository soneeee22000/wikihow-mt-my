# NLLB-200-distilled-600M fine-tune config (en->my, WikiHow-MY).
# Tuned for ~8k pairs: low LR + early stopping (600M overfits a small set fast).
# Model selection on chrF (more stable than BLEU on unsegmented Myanmar).
model: facebook/nllb-200-distilled-600M
src_lang: eng_Latn
tgt_lang: mya_Mymr

data:
  train: data/processed/train.jsonl
  dev: data/processed/dev.jsonl
  test: data/processed/test.jsonl

train:
  learning_rate: 3.0e-5
  warmup_ratio: 0.05
  num_train_epochs: 10 # early-stop on dev chrF; do NOT blindly run all 10
  per_device_train_batch_size: 8
  per_device_eval_batch_size: 8
  gradient_accumulation_steps: 4 # effective 32; drop to 16 on T4
  fp16: true
  eval_strategy: steps
  eval_steps: 250
  save_steps: 250
  save_total_limit: 2
  load_best_model_at_end: true
  metric_for_best_model: chrf
  greater_is_better: true
  early_stopping_patience: 4
  seed: 42
  max_length: 256

generation:
  num_beams: 5
  max_new_tokens: 256
